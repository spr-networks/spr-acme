services:
  spr-acme:
    extends:
      file: docker-compose.yml
      service: spr-acme
    image: ghcr.io/spr-networks/spr-acme:${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:--krun}
    runtime: ${SPR_KRUN_RUNTIME:-spr-krun}
    annotations:
      krun.cpus: "${SPR_KRUN_CPUS:-1}"
      krun.ram_mib: "${SPR_KRUN_RAM_MIB:-512}"
      krun.tap_name: "kruntap0"
      krun.net_uplink: "eth0"
      krun.net_mac: "${SPR_KRUN_MAC:-02:53:50:52:4b:02}"
      krun.vsock_path: "/state/plugins/spr-acme/socket"
      krun.vsock_port: "4040"
    environment:
      SPR_KRUN_PLUGIN_SOCKET: "/run/spr-krun-plugin/spr-acme.sock"
      SPR_KRUN_VSOCK_PORT: "4040"
    volumes: !override
      - "${SUPERDIR}./state/plugins/spr-acme:/state/plugins/spr-acme"
      - "${SUPERDIR}./configs/base/config.sh:/configs/base/config.sh:ro"
      - "${SUPERDIR}./configs/plugins/spr-acme:/configs/spr-acme"
    devices:
      - "/dev/net/tun:/dev/net/tun"
    tmpfs:
      - /run:rw,nosuid,nodev,size=8m

networks:
  acmenet:
    name: spr-acme
    driver_opts:
      com.docker.network.bridge.name: spr-acme
